# ACE Dashboard — nginx virtual host
# Installed by install.sh to /etc/nginx/sites-available/ace-dashboard
#
# 只提供静态文件服务，不再做反向代理。
# 浏览器直接访问 Moonraker 端口 7125，CORS 由 install.sh 自动配置。

server {
    listen 8088;
    server_name _;

    root /home/pi/ace-dashboard;
    index ace.html;

    location / {
        try_files $uri $uri/ /ace.html;
    }
}
