# 请确认 [save_variables] 位于 [ace] 之前（如果使用不同配置文件）
[save_variables]
filename: ~/printer_data/config/vars.cfg

[respond]

[ace]
serial: /dev/serial/by-id/usb-ANYCUBIC_ACE_1-if00
baud: 115200
# 串口超时参数（可选，一般无需修改）
# response_timeout: 2.0
# read_timeout: 0.1
# write_timeout: 0.5
# 最大队列大小，默认 20 条消息
#max_queue_size: 20
# 默认送料速度，出厂范围 10-25
feed_speed: 25
# 默认回抽速度，出厂范围 10-25
retract_speed: 25
# 默认回抽模式，0（普通模式），1（增强模式）
retract_mode: 0
# 换料时的回抽长度
toolchange_retract_length: 100
# 送至打印头的触碰计数，默认 5，如果系统稳定运行可适当降低该值
park_hit_count: 5
# 干燥机最高温度。如果你想烧坏干燥机，那就试试！（开个玩笑，建议在 60 度左右较为安全，但未经充分测试）
max_dryer_temperature: 55
# 换料后禁用送料辅助。默认为 False
disable_assist_after_toolchange: False
# 无限料盘模式 开/关
infinity_spool_mode: False
# 耗材传感器
#filament_sensor: FilamentSensor
# 激进的停车模式：如果启用，ACE 将在停车时更积极地将耗材送至打印头，以确保更可靠的接触。默认为 False
aggressive_parking: False
# 停车距离
max_parking_distance: 100
# 停车时打印头回抽速度
parking_speed: 10
# 基于传感器的停车超时延长时间（秒）
extended_park_time: 10
# 停车完成的最大超时时间（秒）
max_parking_timeout: 60
# 打印过程中连接丢失时调用的宏名称（默认：PAUSE）
set_pause_macro_name: PAUSE

# ── 两阶段同步送料（可选，需配合 aggressive_parking + filament_sensor）──
# 传感器1（filament_sensor）触发后，ACE 单独送料到此。
# 传感器2：挤出机齿轮下游的传感器（耗材穿过挤出齿轮后）。
# 配置后，Phase 1 结束时 ACE + 挤出机将联动送料直到传感器2触发，
# 再进入传统停车（feed_assist 落座确认）。
#filament_sensor_2: toolhead_sensor
# Phase 2 联动送料/回退速度（mm/s），需与挤出机能力匹配
#sync_parking_speed: 15
# Phase 2 每步步进粒度（mm）：CW2 等传感器间距短的挤出机建议 1-3mm
#sync_extrude_step: 2.0

# ── 编码器支持（可选）──
# 耗材移动距离计量与打滑检测，使用光电编码器（如 ITR20403 + BMG 齿轮 + 25 齿码盘）
# 接线：encoder V→3.3V，G→GND，S→主板引脚
# 引脚格式：~ 前缀禁用内部上拉（PCB 已有 100K 外部上拉时使用）
#encoder_pin: ~PA2
# mm/脉冲（双边沿计数）：BMG 齿轮直径 23.6mm → 23.6*π/25/2 ≈ 0.472
#encoder_resolution: 0.472

[gcode_macro STATUS_ACE]
description: ACE设备状态查询
gcode:
    ACE_STATUS

[gcode_macro HELP_ACE]
description: ACE帮助信息查询
gcode:
    ACE_GET_HELP

[gcode_macro _ACE_PRE_TOOLCHANGE]
description: ACE换料前操作
gcode:
    # 空操作
    M118 准备换料

[gcode_macro _ACE_POST_TOOLCHANGE]
description: ACE换料后操作
